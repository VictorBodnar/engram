name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Smoke tests
        run: bash tests/smoke.sh
      - name: Lifecycle tests
        run: bash tests/lifecycle.sh
      - name: Manage tests
        run: bash tests/manage.sh

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin.json
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('.claude-plugin/plugin.json'))
          errs = []
          if not d.get('name'): errs.append('missing name')
          if not d.get('version'): errs.append('missing version')
          if 'hooks' in d: errs.append('explicit hooks field (auto-discovered)')
          for e in errs: print(f'ERROR: {e}')
          sys.exit(1 if errs else 0)
          "
      - name: Validate hooks.json
        run: python3 -c "import json; json.load(open('hooks/hooks.json'))"
      - name: Verify manage.py install works
        run: python3 scripts/manage.py install
      - name: Verify manage.py verify passes
        run: python3 scripts/manage.py verify
      - name: Check version was bumped
        run: |
          git fetch origin main --depth=1
          CURRENT=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          MAIN=$(git show origin/main:.claude-plugin/plugin.json | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          if [ "$CURRENT" = "$MAIN" ]; then
            echo "::warning::Version not bumped ($CURRENT). Update .claude-plugin/plugin.json version before merging."
          else
            echo "Version bumped: $MAIN → $CURRENT"
          fi
